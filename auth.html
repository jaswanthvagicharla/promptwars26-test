<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Path — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <!-- Left Panel: Branding -->
        <div class="auth-brand">
            <div class="brand-content">
                <svg class="brand-logo" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 22l10-4 10 4L12 2z"></path>
                    <path d="m12 18 10 4"></path>
                    <path d="M2 22l10-4"></path>
                </svg>
                <h1>Astra Path</h1>
                <p class="brand-tagline">The Universal Bridge for Human Potential</p>
                <div class="brand-features">
                    <div class="brand-feature">
                        <span class="feature-icon">🧒</span>
                        <span>Discover hidden talents in every child</span>
                    </div>
                    <div class="brand-feature">
                        <span class="feature-icon">🏫</span>
                        <span>Find schools that fit, not pressure</span>
                    </div>
                    <div class="brand-feature">
                        <span class="feature-icon">🛡️</span>
                        <span>Guardian-verified safety checks</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Auth Form -->
        <div class="auth-form-panel">
            <div class="auth-form-wrapper">
                <!-- Tab Switcher -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="login-tab" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="register-tab" onclick="switchTab('register')">Create Account</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form" onsubmit="return false;">
                    <div class="auth-input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="auth-input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="auth-submit-btn" id="login-btn">Sign In</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden" onsubmit="return false;">
                    <div class="auth-input-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" placeholder="Your name" required>
                    </div>
                    <div class="auth-input-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="auth-input-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="auth-submit-btn" id="register-btn">Create Account</button>
                </form>

                <div class="auth-divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login Buttons -->
                <div class="social-buttons">
                    <button class="social-btn google-btn" id="google-signin-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Sign in with Google
                    </button>
                </div>

                <!-- Error Message Area -->
                <div id="auth-error" class="auth-error hidden"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Google Service) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>
</body>
</html>
